<!DOCTYPE html>
<html>
<head>
  <title>Download Recipe Images</title>
</head>
<body>
  <h2>Download All Recipe Images</h2>
  <button onclick="downloadAll()">Download ZIP</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <script>
    const images = [
      { name: "tindora-fry.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2017/07/tendli-fry-recipe-1a.jpg" },
      { name: "aloo-matar.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2021/04/aloo-matar-1.jpg" },
      { name: "negroni-sbagliato.jpg", url: "https://www.campari.com/sites/default/files/2020-02/SBAGLIATO.jpg" },
      { name: "karela-sabzi.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2010/08/karela-sabji-recipe-1a.jpg" },
      { name: "arbi-sabzi.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2015/10/arbi-sabzi-recipe-1.jpg" },
      { name: "spritz-bitter.jpg", url: "https://cdn.diffords.com/contrib/stock-images/2018/05/5af3140967a12.jpg" },
      { name: "brinjal-sambar.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2013/08/brinjal-sambar-1a.jpg" },
      { name: "chana-dal.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2021/06/chana-dal-recipe-1.jpg" },
      { name: "onion-pakora.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2016/07/onion-pakoda-recipe-1.jpg" },
      { name: "pav-bhaji.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2014/07/pav-bhaji-recipe-1.jpg" },
      { name: "vangi-bath.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2018/12/vangi-bhath-recipe-1a.jpg" },
      { name: "sarson-saag.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2018/12/sarson-ka-saag-1b.jpg" },
      { name: "boondi-raita.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2012/05/boondi-raita-recipe-1.jpg" },
      { name: "masala-papad.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2014/11/masala-papad-recipe-1.jpg" },
      { name: "veg-biryani.jpg", url: "https://www.vegrecipesofindia.com/wp-content/uploads/2021/12/veg-biryani-1.jpg" },
      { name: "chips.jpg", url: "https://www.bbcgoodfood.com/sites/default/files/recipe/recipe-image/2016/08/chunky-chips.jpg" }
    ];

    async function downloadAll() {
      const zip = new JSZip();
      const folder = zip.folder("recipes");

      for (const img of images) {
        try {
          const response = await fetch(img.url);
          const blob = await response.blob();
          folder.file(img.name, blob);
        } catch (e) {
          console.log("Failed:", img.name);
        }
      }

      const content = await zip.generateAsync({ type: "blob" });
      saveAs(content, "recipe-images.zip");
    }
  </script>
</body>
</html>
