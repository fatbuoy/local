<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--white:#fff;--navy:#0c2340;--navy2:#1a3a5c;--navy3:#2d5a8a;
  --blue:#185fa5;--text:#1a1a1a;--muted:#888780;--faint:#aaa;
  --border:#e0ddd7;--border2:#e8e6e0;--surface:#f8f7f3;--bar-bg:#f0ede8;
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;padding-bottom:40px}

/* ── HEADER ── */
.header{background:var(--navy);padding:12px 16px 10px;margin-bottom:12px}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.header-title{font-size:18px;font-weight:600;color:#fff;letter-spacing:-0.3px;flex-shrink:0}
.header-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.header-badge{display:inline-block;padding:2px 9px;background:var(--navy2);border:1px solid var(--navy3);border-radius:999px;font-size:11px;color:#a8cfed;font-weight:500;white-space:nowrap}
.header-weeknav{display:flex;align-items:center;gap:4px;margin-left:8px}
.hw-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#a8cfed;font-size:11px;font-weight:500;padding:2px 9px;cursor:pointer;font-family:inherit;white-space:nowrap;line-height:1.6;-webkit-tap-highlight-color:transparent;transition:background .15s}
.hw-btn:hover{background:rgba(255,255,255,.14)}
.hw-btn.hw-today{background:rgba(24,95,165,.5);border-color:rgba(24,95,165,.7);color:#e6f1fb}
.hw-label{font-size:11px;color:#7fa8cc;white-space:nowrap}

/* ── CONTAINER ── */
.container{max-width:880px;margin:0 auto;padding:0 14px}
.sec-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}

/* ── TODAY CARD ── */
.today-card{background:var(--navy);border-radius:13px;padding:14px 15px;margin-bottom:13px;position:relative;overflow:hidden}
.today-card::before{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
.today-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.today-label{font-size:10px;font-weight:600;color:#7fa8cc;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.today-activity{font-size:20px;font-weight:600;color:#fff;line-height:1.1}
.today-sub{font-size:12px;color:#7fa8cc;margin-top:2px}
.today-kcal-block{text-align:right;flex-shrink:0}
.today-kcal{font-size:28px;font-weight:600;color:#fff;line-height:1}
.today-kcal-lbl{font-size:10px;color:#7fa8cc;margin-top:2px}
.today-tagline{font-size:12px;color:#a8cfed;line-height:1.5;padding-top:8px;border-top:1px solid rgba(255,255,255,.1)}
.today-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.t-pill{font-size:10px;font-weight:500;padding:2px 9px;border-radius:999px;border:1px solid rgba(255,255,255,.2);color:#e6f1fb}
.t-pill.alc{background:rgba(173,168,240,.25);border-color:rgba(173,168,240,.5)}
.t-pill.noalc{background:rgba(255,255,255,.07)}
.t-pill.act{background:rgba(255,255,255,.1)}

/* ── DAY STRIP ── */
.day-strip-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:0 -14px 13px;padding:4px 14px 8px}
.day-strip-wrap::-webkit-scrollbar{display:none}
.day-strip{display:flex;gap:6px;width:max-content}
.day-card{width:80px;flex-shrink:0;border:1.5px solid var(--border);border-radius:11px;padding:8px 7px 0 7px;background:var(--white);cursor:pointer;display:flex;flex-direction:column;min-height:105px;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.day-card:hover{border-color:#bbb}
.day-card.sel{border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,95,165,.15)}
.day-card.today-marker{background:#f0f6ff}
.day-name{font-size:9.5px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.day-pill-sm{display:inline-block;font-size:8px;font-weight:600;padding:1.5px 5px;border-radius:999px;margin-bottom:3px;letter-spacing:.02em;width:fit-content}
.pill-walk{background:#f0ede8;color:#5a5750}
.pill-run{background:#deeaf7;color:#0c447c}
.pill-hike{background:#faeeda;color:#633806}
.pill-cycle{background:#e2f0d6;color:#27500a}
.pill-longrun{background:#eeedfe;color:#3c3489}
.pill-rest{background:#f0ede8;color:#888}
.pill-marathon{background:#2d0a6e;color:#d4c8ff}
.pill-taper{background:#fff0e0;color:#a05000}
.pill-recovery{background:#e0f5f0;color:#0a5040}
.day-act{font-size:9px;color:#666;line-height:1.25;margin-bottom:3px;flex:1}
.day-kcal{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px}
.cal-bar-wrap{padding-bottom:8px}
.cal-bar-bg{height:3px;border-radius:2px;background:var(--bar-bg);overflow:hidden}
.cal-bar-fill{height:100%;border-radius:2px}

/* ── DETAIL PANEL ── */
.detail-outer{background:var(--white);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:13px}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid #f0ede8;gap:8px}
.dh-day{font-size:15px;font-weight:600;color:var(--text)}
.dh-date{font-size:11px;color:#888;margin-top:1px}
.dh-act{font-size:11px;color:#888;margin-top:1px}
.dh-right{text-align:right;flex-shrink:0}
.dh-kcal{font-size:24px;font-weight:600;color:var(--text);line-height:1}
.dh-lbl{font-size:10px;color:var(--faint);margin-top:2px}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.meal-tile{background:var(--surface);border-radius:9px;padding:9px 10px}
.mt-lbl{font-size:9.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.mt-kcal{font-size:13px;font-weight:600;color:var(--text)}
.mt-desc{font-size:10.5px;color:#777;margin-top:2px;line-height:1.4}
.extra-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.extra-tile{border-radius:9px;padding:9px 10px;border:1px solid transparent}
.extra-tile.training{background:#eaf5e1;border-color:#b2d98a}
.extra-tile.training .mt-lbl{color:#3b6d11}
.extra-tile.training .mt-kcal{color:#27500a}
.extra-tile.training .mt-desc{color:#4a7a1a}
.extra-tile.alcohol{background:#eeedfe;border-color:#b5b0f0}
.extra-tile.alcohol .mt-lbl{color:#534ab7}
.extra-tile.alcohol .mt-kcal{color:#3c3489}
.extra-tile.alcohol .mt-desc{color:#534ab7}
.extra-tile.carb{background:#fff5e0;border-color:#f0c050}
.extra-tile.carb .mt-lbl{color:#8a5a00}
.extra-tile.carb .mt-kcal{color:#6a3e00}
.extra-tile.carb .mt-desc{color:#8a5a00}
.extra-tile.marathon{background:#1a0040;border-color:#6040b0}
.extra-tile.marathon .mt-lbl{color:#a090d0}
.extra-tile.marathon .mt-kcal{color:#d4c8ff}
.extra-tile.marathon .mt-desc{color:#a090d0}
.extra-tile.none{background:var(--surface);border-color:var(--border2)}
.extra-tile.none .mt-lbl{color:#ccc}
.extra-tile.none .mt-kcal{color:#999}
.extra-tile.none .mt-desc{color:#ccc}
.bar-row{margin:8px 0 6px}
.split-bar{height:5px;border-radius:3px;overflow:hidden;display:flex;margin-bottom:5px}
.split-legend{display:flex;gap:10px;flex-wrap:wrap}
.sl-item{display:flex;align-items:center;gap:3px;font-size:10px;color:#888}
.sl-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.pb-footnote{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface);border-radius:7px;margin-top:3px}
.pb-text{font-size:10.5px;color:var(--faint)}
.pb-amt{font-size:10.5px;font-weight:600;color:#777}

/* ── DIVIDER ── */
.section-divider{border:none;border-top:1px solid var(--border2);margin:14px 0}

/* ── PHASE BLOCK ── */
.phase-block{background:var(--white);border:1px solid var(--border);border-radius:13px;padding:14px 15px;margin-bottom:13px}
.phase-block-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.phase-block-title{font-size:14px;font-weight:600;color:var(--text)}
.phase-block-sub{font-size:11px;color:#888;margin-top:2px}
.phase-block-avg{text-align:right}
.phase-block-avg-val{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.phase-block-avg-lbl{font-size:10px;color:var(--faint);margin-top:2px}
.phase-nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.phase-num{background:var(--surface);border-radius:8px;padding:8px 10px}
.phase-num-lbl{font-size:9.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.phase-num-val{font-size:14px;font-weight:600;color:var(--text)}
.phase-num-sub{font-size:9.5px;color:#bbb;margin-top:1px}
.phase-desc{font-size:11.5px;color:#666;line-height:1.55;margin-bottom:11px}
.phase-tabs{display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.phase-tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 11px;border:1px solid #d0cec8;border-radius:7px;font-size:11px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--muted);transition:all .15s;font-family:inherit;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tab:hover{border-color:#999;color:#444}
.tab.active{background:var(--navy);color:#e6f1fb;border-color:var(--navy)}

/* ── PRINCIPLES ── */
.principles-grid{display:grid;grid-template-columns:1fr;gap:5px;margin-bottom:16px}
.p-item{font-size:11px;color:#555;padding:8px 11px;background:var(--white);border-radius:8px;line-height:1.5;border-left:3px solid var(--blue);border-top:1px solid var(--border2);border-right:1px solid var(--border2);border-bottom:1px solid var(--border2)}

/* ── FOOTER ── */
.footer{text-align:center;font-size:10px;color:#ccc;margin-top:14px}

/* ── DESKTOP ── */
@media(min-width:600px){
  .header{padding:13px 24px 11px}
  .header-title{font-size:20px}
  .container{padding:0 20px}
  .day-strip-wrap{overflow:visible;margin:0 0 13px;padding:3px 0 6px}
  .day-strip{display:grid;grid-template-columns:repeat(7,1fr);width:auto}
  .day-card{width:auto}
  .phase-nums{grid-template-columns:repeat(3,1fr)}
  .principles-grid{grid-template-columns:1fr 1fr}
  .detail-outer{padding:18px}
  .phase-block{padding:16px 18px}
}
</style>
</head>
<body>

<div class="header">
  <div class="container">
    <div class="header-row">
      <div class="header-title">FatBoy's Fuel Plan</div>
      <div class="header-meta">
        <span class="header-badge" id="headerBadge"></span>
        <div class="header-weeknav" id="headerWeekNav"></div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div id="todayCard"></div>
  <div class="sec-lbl">This week</div>
  <div class="day-strip-wrap"><div class="day-strip" id="dayGrid"></div></div>
  <div id="detailPanel"></div>
  <hr class="section-divider">
  <div class="phase-block" id="phaseBlock"></div>
  <div class="sec-lbl">Key principles</div>
  <div class="principles-grid" id="principles"></div>
  <div class="footer">FatBoy's Fuel Plan · Jura Marathon 14 Jun 2026 · Built for a 47yo vegetarian machine</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA — loaded from fuel_plan_data.json
// Edit schedule.csv / phases.csv, run csv_to_json.py to update.
// ═══════════════════════════════════════════════════════

// Activity type → bar colour
const BAR_COL={walk:'#888780',run:'#185fa5',hike:'#ef9f27',cycle:'#3b6d11',longrun:'#7f77dd',rest:'#c8c4bc',marathon:'#4020a0',taper:'#d08030',recovery:'#20a080'};
const PILL_CLS={walk:'pill-walk',run:'pill-run',hike:'pill-hike',cycle:'pill-cycle',longrun:'pill-longrun',rest:'pill-rest',marathon:'pill-marathon',taper:'pill-taper',recovery:'pill-recovery'};
const PILL_LBL={walk:'Walk',run:'Run',hike:'Hike',cycle:'Cycle',longrun:'Long run',rest:'Rest',marathon:'Marathon',taper:'Taper',recovery:'Recovery'};

// ── LOAD JSON DATA ────────────────────────────────────────────────────────
let SCHEDULE = [];
let PHASES   = [];
let _dataLoaded = false;

function _buildScheduleFromJSON(data) {
  // Convert JSON weeks → SCHEDULE array matching original shape
  SCHEDULE = data.weeks.map(wk => {
    const monParts = wk.week_start.split('-');
    const mon = new Date(+monParts[0], +monParts[1]-1, +monParts[2]);
    const days = wk.days.map(day => ({
      label: day.label,
      act:   day.activity,
      det:   day.detail,
      type:  day.type,
      kcal:  day.kcal,
      pb:    day.pb_g,
      alc:   day.alc,
      tagline: day.tagline,
      b: day.b_kcal, l: day.l_kcal, s: day.s_kcal, d: day.d_kcal, r: day.r_kcal,
      tr: day.tr_label ? { l: day.tr_label, d: day.tr_detail } : null,
      zw: day.zw_note  ? { l: 'Zum Wohl',   d: day.zw_note }   : null,
      carbLoad:   day.type === 'taper' || (day.zw_note === '' && day.d_kcal > 700 && ['hike','rest'].includes(day.type) && day.l_kcal > 650),
      marathonDay: day.type === 'marathon',
    }));
    return { mon, days };
  });

  PHASES = data.phases.map((p, idx) => {
    const startParts = p.start_date.split('-');
    const endParts   = p.end_date.split('-');
    const start = new Date(+startParts[0], +startParts[1]-1, +startParts[2]);
    const end   = new Date(+endParts[0],   +endParts[1]-1,   +endParts[2]);
    // Map phase to week indices by date overlap
    const wks = SCHEDULE.reduce((acc, wk, wi) => {
      const wkEnd = new Date(wk.mon); wkEnd.setDate(wk.mon.getDate()+6);
      if (wk.mon <= end && wkEnd >= start) acc.push(wi);
      return acc;
    }, []);
    return {
      label: p.label, sub: p.sub, avg: p.avg_kcal,
      desc: p.description,
      wks,
      restK: p.rest_kcal, runK: p.run_kcal, longK: p.long_kcal,
    };
  });
}

function _showLoadError(msg) {
  document.body.innerHTML = `<div style="font-family:sans-serif;padding:40px;max-width:600px;margin:0 auto">
    <h2 style="color:#c00;margin-bottom:12px">Could not load plan data</h2>
    <p style="color:#444;line-height:1.6">${msg}</p>
    <p style="margin-top:16px;color:#666;font-size:13px">
      <strong>To run locally:</strong> open a terminal in this folder and run:<br>
      <code style="background:#f0f0f0;padding:4px 8px;border-radius:4px;display:inline-block;margin-top:6px">python3 -m http.server 8080</code><br>
      Then visit <a href="http://localhost:8080/fatboys-fuel-plan.html">http://localhost:8080/fatboys-fuel-plan.html</a>
    </p>
  </div>`;
}

async function _loadData() {
  try {
    const resp = await fetch('fuel_plan_data.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    _buildScheduleFromJSON(data);
    _dataLoaded = true;
    _init();
  } catch(e) {
    // Friendly error with instructions
    _showLoadError(
      `<strong>fuel_plan_data.json</strong> could not be fetched: <em>${e.message}</em><br><br>
       Make sure <code>fuel_plan_data.json</code> is in the same folder as the HTML file.
       Browsers block local file reads for security — you need a local web server.`
    );
  }
}

// ── DATE UTILS ─────────────────────────────────────────
// ── DATE UTILS ─────────────────────────────────────────
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const DAY_NAMES   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function fmtDate(dt){
  const n=dt.getDate(), s=(n===1||n===21||n===31)?'st':(n===2||n===22)?'nd':(n===3||n===23)?'rd':'th';
  return `${DAY_NAMES[dt.getDay()]}, ${n}${s} ${MONTH_NAMES[dt.getMonth()]} ${dt.getFullYear()}`;
}

// Find which week (0-indexed into SCHEDULE) contains today
function findTodayWeek(){
  for(let w=0;w<SCHEDULE.length;w++){
    const mon=SCHEDULE[w].mon;
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    if(TODAY>=mon && TODAY<=sun) return w;
  }
  // before plan: return first; after plan: return last
  if(TODAY<SCHEDULE[0].mon) return 0;
  return SCHEDULE.length-1;
}

// JS getDay 0=Sun → Mon=0..Sun=6
function jsDayToIdx(jsDay){ return jsDay===0?6:jsDay-1; }

function findPhaseForWeek(wi){
  for(let p=0;p<PHASES.length;p++){
    if(PHASES[p].wks.includes(wi)) return p;
  }
  return PHASES.length-1;
}

const todayWeekIdx_ref = { v: 0 }; // set after load
let todayWeekIdx = 0;
let todayDayIdx    = 0;
let currentWeekIdx = 0;
let selectedDayIdx = 0;
let currentPhaseIdx= 0;

const MAX_K = 3800;

// ── RENDER ─────────────────────────────────────────────
// Date is now shown inside the today card

function render(){
  const week  = SCHEDULE[currentWeekIdx];
  const phase = PHASES[currentPhaseIdx];
  const day   = week.days[selectedDayIdx];
  const isTodayWeek = (currentWeekIdx === todayWeekIdx);

  document.getElementById('headerBadge').textContent = phase.label;

  // ── HEADER WEEK NAV ──
  const _prevWk = currentWeekIdx>0?currentWeekIdx-1:null;
  const _nextWk = currentWeekIdx<SCHEDULE.length-1?currentWeekIdx+1:null;
  const _isTW   = currentWeekIdx===todayWeekIdx;
  const _wkMon  = SCHEDULE[currentWeekIdx].mon;
  const _wkSun  = new Date(_wkMon); _wkSun.setDate(_wkMon.getDate()+6);
  function _fs(dt){ return `${dt.getDate()} ${MONTH_NAMES[dt.getMonth()].slice(0,3)}`; }
  document.getElementById('headerWeekNav').innerHTML =
    (_prevWk!==null?`<button class="hw-btn" onclick="currentWeekIdx=${_prevWk};currentPhaseIdx=findPhaseForWeek(${_prevWk});selectedDayIdx=0;render()">‹</button>`:'') +
    `<span class="hw-label">${_fs(_wkMon)} – ${_fs(_wkSun)}</span>` +
    (!_isTW?`<button class="hw-btn hw-today" onclick="currentWeekIdx=${todayWeekIdx};currentPhaseIdx=findPhaseForWeek(${todayWeekIdx});selectedDayIdx=${todayDayIdx};render()">Now</button>`:'') +
    (_nextWk!==null?`<button class="hw-btn" onclick="currentWeekIdx=${_nextWk};currentPhaseIdx=findPhaseForWeek(${_nextWk});selectedDayIdx=0;render()">›</button>`:'');

  // ── TODAY CARD (always today's actual day) ──
  const todayWeek = SCHEDULE[todayWeekIdx];
  const todayDay  = todayWeek.days[todayDayIdx];
  const isCarb    = !!todayDay.carbLoad;
  const isMara    = todayDay.type==='marathon';

  let taglineExtra = '';
  if(isCarb) taglineExtra = ' 🍝 Carb load day.';
  if(todayDay.alc) taglineExtra += ' 🍺 Zum Wohl tonight.';

  // Set date inside today card label
  const todayDateEl = document.getElementById('todayDateInline');
  if(todayDateEl) todayDateEl.textContent = fmtDate(TODAY);

  document.getElementById('todayCard').innerHTML = `
    <div class="today-card">
      <div class="today-top">
        <div>
          <div class="today-label">Today's plan · <span id="todayDateInline" style="font-weight:400;text-transform:none;letter-spacing:0"></span></div>
          <div class="today-activity">${todayDay.act}</div>
          <div class="today-sub">${todayDay.det}</div>
        </div>
        <div class="today-kcal-block">
          <div class="today-kcal">${todayDay.kcal.toLocaleString()}</div>
          <div class="today-kcal-lbl">kcal target</div>
        </div>
      </div>
      <div class="today-tagline">${todayDay.tagline}${taglineExtra}</div>
      <div class="today-pills">
        <span class="t-pill act">${PILL_LBL[todayDay.type]}</span>
        <span class="t-pill act">${todayDay.pb}g PB</span>
        ${todayDay.alc ? '<span class="t-pill alc">Zum Wohl ✓</span>' : '<span class="t-pill noalc">No drinks tonight</span>'}
        ${isCarb ? '<span class="t-pill" style="background:rgba(240,192,80,.3);color:#ffe0a0">Carb load 🍝</span>' : ''}
        ${isMara ? '<span class="t-pill" style="background:rgba(100,60,200,.4);color:#d4c8ff">★ RACE DAY</span>' : ''}
      </div>
    </div>`;

  // ── DAY STRIP ──
  document.getElementById('dayGrid').innerHTML = week.days.map((d2, i) => {
    const pct = Math.round(d2.kcal / MAX_K * 100);
    const isToday2 = isTodayWeek && i===todayDayIdx;
    return `<div class="day-card ${i===selectedDayIdx?'sel':''} ${isToday2?'today-marker':''}" onclick="selectedDayIdx=${i};render()">
      <div class="day-name">${d2.label.split(' ')[0]}<br><span style="font-size:8px;font-weight:500;color:#777">${d2.label.split(' ')[1]}</span></div>
      <span class="day-pill-sm ${PILL_CLS[d2.type]}">${PILL_LBL[d2.type]}</span>
      <div class="day-act">${d2.act}<br><span style="color:#777">${d2.det}</span></div>
      <div class="day-kcal">${d2.kcal.toLocaleString()}</div>
      <div class="cal-bar-wrap"><div class="cal-bar-bg"><div class="cal-bar-fill" style="width:${pct}%;background:${BAR_COL[d2.type]}"></div></div></div>
    </div>`;
  }).join('');

  // Scroll selected into view
  setTimeout(()=>{
    const sel=document.querySelector('.day-card.sel');
    if(sel) sel.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },60);

  // ── DETAIL PANEL ──
  const m = day;
  // Use m.kcal as authoritative total — marathon day has in-race nutrition
  // not stored as regular meal fields, so summing fields gives wrong number
  const tot = m.kcal;
  const mealFieldSum = m.b + m.l + m.s + m.d + m.r;
  const segTotal = mealFieldSum > 0 ? mealFieldSum : tot;
  const segs = [m.b, m.l>0?m.l:Math.round(tot*0.28), m.s>0?m.s:Math.round(tot*0.14), m.d + m.r];
  const barCols = ['#378add','#1d9e75','#ba7517','#534ab7'];

  const trnHTML = m.tr
    ? `<div class="extra-tile ${m.carbLoad?'carb':m.type==='marathon'?'marathon':'training'}"><div class="mt-lbl">${m.tr.l}</div><div class="mt-kcal">Included</div><div class="mt-desc">${m.tr.d}</div></div>`
    : `<div class="extra-tile none"><div class="mt-lbl">Training fuel</div><div class="mt-kcal">Rest day</div><div class="mt-desc">No special fuelling needed</div></div>`;

  const zwHTML = m.zw
    ? `<div class="extra-tile alcohol"><div class="mt-lbl">Zum Wohl</div><div class="mt-kcal">~200–300 kcal</div><div class="mt-desc">${m.zw.d}</div></div>`
    : `<div class="extra-tile none"><div class="mt-lbl">Zum Wohl</div><div class="mt-kcal">None tonight</div><div class="mt-desc">${m.type==='hike'&&[5].includes(selectedDayIdx)?'Saturday protected — race/run tomorrow':m.type==='taper'||m.carbLoad?'Race week — no alcohol':'Mid-week or rest day'}</div></div>`;

  const isTodaySelected = isTodayWeek && selectedDayIdx===todayDayIdx;

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-outer">
      <div class="detail-head">
        <div>
          <div class="dh-day">${["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"][selectedDayIdx]}${isTodaySelected?' <span style="font-size:10px;font-weight:400;color:#888">· today</span>':''}</div>
          <div class="dh-date">${m.label}</div>
          <div class="dh-act">${m.act} · ${m.det}</div>
        </div>
        <div class="dh-right"><div class="dh-kcal">${tot.toLocaleString()}</div><div class="dh-lbl">kcal target</div></div>
      </div>
      <div class="meal-grid">
        <div class="meal-tile"><div class="mt-lbl">Breakfast</div><div class="mt-kcal">${m.b} kcal</div><div class="mt-desc">${m.type==='marathon'?'Big race breakfast: 2x oats + banana + PB (600 kcal). 3h before start.':selectedDayIdx===0&&m.type!=='run'?'Wildcard: poha, upma, besan cheela, thepla…':'50g oats + '+m.pb+'g PB'}</div></div>
        <div class="meal-tile"><div class="mt-lbl">Lunch</div><div class="mt-kcal">${m.l>0?m.l+' kcal':'Race fuelling'}</div><div class="mt-desc">${m.type==='marathon'?'Gels + race nutrition during race':'Dal/sabzi + roti or rice — sized to the day\'s effort'}</div></div>
        <div class="meal-tile"><div class="mt-lbl">Snacks</div><div class="mt-kcal">${m.s>0?m.s+' kcal':'In race'}</div><div class="mt-desc">${m.type==='marathon'?'Energy gels, banana, sports drink at stations':m.carbLoad?'Fruit, banana, rice crackers — keep carbs high':'Hummus, nuts, curd, dates, PB'}</div></div>
        <div class="meal-tile"><div class="mt-lbl">${m.r>0?'Dinner + recovery':'Dinner'}</div><div class="mt-kcal">${(m.d+m.r).toLocaleString()} kcal</div><div class="mt-desc">${m.type==='marathon'?'★ Post-race feast. Whatever you want. You earned it.':m.carbLoad&&selectedDayIdx===6?'★ Pre-race dinner: big pasta/rice + dal. Eat at 7pm. Early bed.':m.carbLoad?'Increase carb portions: extra rice, pasta or roti':selectedDayIdx===5?'★ Most important meal: carb-heavy pre-load for tomorrow\'s run':'Dal/pasta/curry — sized to day\'s burn'}</div></div>
      </div>
      <div class="extra-grid">${trnHTML}${zwHTML}</div>
      <div class="bar-row">
        <div class="split-bar">${segs.map((v,i2)=>`<div style="width:${tot>0?Math.round(v/tot*100):25}%;background:${barCols[i2]};height:100%"></div>`).join('')}</div>
        <div class="split-legend">${['Breakfast','Lunch','Snacks','Dinner'].map((l2,i2)=>`<span class="sl-item"><span class="sl-dot" style="background:${barCols[i2]}"></span>${l2}</span>`).join('')}</div>
      </div>
      <div class="pb-footnote">
        <span class="pb-text">Peanut butter (${PILL_LBL[m.type].toLowerCase()} dose)</span>
        <span class="pb-amt">${m.pb}g · ~${Math.round(m.pb*6)} kcal</span>
      </div>
    </div>`;

  // ── WEEK NAV + PHASE BLOCK ──
  const prevWk = currentWeekIdx>0?currentWeekIdx-1:null;
  const nextWk = currentWeekIdx<SCHEDULE.length-1?currentWeekIdx+1:null;
  const wkMon  = week.mon;
  const wkSun  = new Date(wkMon); wkSun.setDate(wkMon.getDate()+6);
  function fmtShort(dt){ return `${dt.getDate()} ${MONTH_NAMES[dt.getMonth()].slice(0,3)}`; }

  document.getElementById('phaseBlock').innerHTML = `
    <div class="phase-block-header">
      <div>
        <div class="phase-block-title">${phase.label}</div>
        <div class="phase-block-sub">${phase.sub}</div>
      </div>
      <div class="phase-block-avg">
        <div class="phase-block-avg-val">${phase.avg.toLocaleString()}</div>
        <div class="phase-block-avg-lbl">avg kcal/day</div>
      </div>
    </div>
    <div class="phase-nums">
      <div class="phase-num"><div class="phase-num-lbl">Rest day</div><div class="phase-num-val">${phase.restK.toLocaleString()}</div><div class="phase-num-sub">deficit anchor</div></div>
      <div class="phase-num"><div class="phase-num-lbl">Run days</div><div class="phase-num-val">${phase.runK.toLocaleString()}</div><div class="phase-num-sub">Tue & Thu</div></div>
      <div class="phase-num"><div class="phase-num-lbl">${currentPhaseIdx===3?'Race day':'Long run'}</div><div class="phase-num-val">${phase.longK.toLocaleString()}</div><div class="phase-num-sub">${currentPhaseIdx===3?'14 Jun':'peak day'}</div></div>
    </div>
    <div class="phase-desc">${phase.desc}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="sec-lbl" style="margin-bottom:0">Week of ${fmtShort(wkMon)} – ${fmtShort(wkSun)}</div>
      <div style="display:flex;gap:6px">
        ${prevWk!==null?`<button class="tab" onclick="currentWeekIdx=${prevWk};currentPhaseIdx=findPhaseForWeek(${prevWk});selectedDayIdx=0;render()">← Prev</button>`:''}
        ${isTodayWeek?'':`<button class="tab" onclick="currentWeekIdx=${todayWeekIdx};currentPhaseIdx=findPhaseForWeek(${todayWeekIdx});selectedDayIdx=${todayDayIdx};render()">Today</button>`}
        ${nextWk!==null?`<button class="tab" onclick="currentWeekIdx=${nextWk};currentPhaseIdx=findPhaseForWeek(${nextWk});selectedDayIdx=0;render()">Next →</button>`:''}
      </div>
    </div>
    <div class="sec-lbl" style="margin-bottom:6px">Jump to phase</div>
    <div class="phase-tabs">${PHASES.map((px,pi)=>`<button class="tab ${pi===currentPhaseIdx?'active':''}" onclick="currentPhaseIdx=${pi};currentWeekIdx=${px.wks[0]};selectedDayIdx=0;render()">${px.label}</button>`).join('')}</div>`;

  // ── PRINCIPLES ──
  document.getElementById('principles').innerHTML = [
    'Monday is always the deficit anchor — lowest calories of the week',
    'Belly fat = cortisol/under-fuelling. Eat more on hard days, not less',
    'Saturday dinner = post-hike recovery + Sunday pre-load. Most important meal of the week',
    'Post long-run: chocolate milk or lassi + banana within 30 min. Non-negotiable',
    'Peanut butter scales: 15g rest → 20g run → 25g cycle/hike → 30g long run',
    'Zum Wohl slots: Friday + Sunday only. Race week: no alcohol from Mon 8 Jun',
    'Peak long run 24 May (32k): 3,050 kcal. Fuel it like a race',
    'Jura Marathon 14 Jun: Carb load Wed–Sat. Race breakfast 3h before start. Gels every 40–45 min'
  ].map(t=>`<div class="p-item">${t}</div>`).join('');
}

// Expose findPhaseForWeek globally for inline onclick
window.findPhaseForWeek = findPhaseForWeek;

function _init() {
  todayWeekIdx   = findTodayWeek();
  todayDayIdx    = jsDayToIdx(TODAY.getDay());  // ← was missing, caused header to always show Monday
  currentWeekIdx = todayWeekIdx;
  selectedDayIdx = todayDayIdx;
  currentPhaseIdx = findPhaseForWeek(currentWeekIdx);
  render();
}

// Kick off — fetch JSON then render
_loadData();
</script>
