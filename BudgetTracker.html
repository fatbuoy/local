<style>
/*
 * FATBOY DASHBOARD STYLEGUIDE — applied verbatim
 */
:root {
  --bg:#f5f4f0; --white:#fff; --surface:#f8f7f3;
  --navy:#0c2340; --navy2:#1a3a5c; --navy3:#2d5a8a; --blue:#185fa5;
  --text:#1a1a1a; --muted:#666; --faint:#999;
  --on-navy:#fff; --on-navy2:#a8cfed; --on-navy3:#7fa8cc;
  --border:#e0ddd7; --border2:#e8e6e0;
  --r-sm:6px; --r-md:10px; --r-lg:13px; --r-pill:999px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px;
  --t-xs:9.5px; --t-sm:11px; --t-base:13px; --t-md:14px;
  --t-lg:17px; --t-xl:20px; --t-2xl:26px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:var(--t-md);line-height:1.5;padding-bottom:40px}
.container{max-width:900px;margin:0 auto;padding:0 14px}
@media(min-width:600px){.container{padding:0 var(--sp-6)}}
.grid-2{display:grid;grid-template-columns:1fr;gap:var(--sp-2)}
@media(min-width:600px){.grid-2{grid-template-columns:1fr 1fr}}
.col-full{grid-column:1/-1}
.sec-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:var(--sp-2)}
/* Header */
.header{background:var(--navy);padding:12px var(--sp-4) 10px;margin-bottom:14px}
@media(min-width:600px){.header{padding:13px var(--sp-6) 11px}}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);flex-wrap:wrap}
.header-title{font-size:18px;font-weight:600;color:var(--on-navy);letter-spacing:-0.3px}
@media(min-width:600px){.header-title{font-size:var(--t-xl)}}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.header-badge{padding:2px 9px;background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--r-pill);font-size:11px;color:var(--on-navy2);font-weight:500}
.hw-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--r-sm);color:var(--on-navy2);font-size:11px;font-weight:500;padding:2px 10px;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:background .15s}
.hw-btn:hover{background:rgba(255,255,255,.15)}
.hw-btn.active{background:rgba(24,95,165,.5);border-color:rgba(24,95,165,.8);color:#e6f1fb}
.hw-label{font-size:11px;color:var(--on-navy3)}
/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-3) 14px;margin-bottom:14px;overflow:hidden}
.card-hero{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px}
.hero-strip{background:var(--navy);padding:14px var(--sp-4) 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:var(--sp-2)}
.hs-title{font-size:var(--t-lg);font-weight:600;color:var(--on-navy)}
.hs-sub{font-size:11px;color:var(--on-navy3);margin-top:2px}
.hs-right{text-align:right;flex-shrink:0}
.hs-stat{font-size:var(--t-2xl);font-weight:600;color:var(--on-navy);line-height:1}
.hs-lbl{font-size:10px;color:var(--on-navy3);margin-top:2px}
.card-body{padding:var(--sp-3) 14px}
.surface{background:var(--surface);border-radius:var(--r-md);padding:10px 12px}
/* Stat tiles */
.stat-tile{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:10px 12px}
.st-label{font-size:var(--t-xs);font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.st-value{font-size:var(--t-2xl);font-weight:600;color:var(--text);line-height:1;margin-bottom:3px}
.st-sub{font-size:11px;color:var(--muted)}
/* Progress */
.progress-wrap{padding-bottom:8px}
.progress-bg{height:3px;border-radius:2px;background:#f0ede8;overflow:hidden}
.progress-bg.h-md{height:6px}
.progress-bg.h-lg{height:10px}
.progress-fill{height:100%;border-radius:2px}
.fill-primary{background:var(--blue)}
.fill-success{background:#3b6d11}
.fill-warning{background:#ef9f27}
.fill-danger{background:#c0392b}
.fill-neutral{background:#888780}
/* Pills */
.pill{display:inline-block;font-size:8px;font-weight:600;padding:1.5px 5px;border-radius:var(--r-pill);width:fit-content}
.pill-success{background:#e2f0d6;color:#27500a}
.pill-warning{background:#faeeda;color:#633806}
.pill-danger{background:#fde8e8;color:#7c0c0c}
.pill-info{background:#deeaf7;color:#0c447c}
.pill-neutral{background:#f0ede8;color:#666}
/* Legend */
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 12px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555;cursor:pointer;user-select:none}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Utilities */
.flex{display:flex}.flex-between{display:flex;align-items:center;justify-content:space-between}
.text-muted{color:var(--muted)}.text-faint{color:var(--faint)}.text-blue{color:var(--blue)}
.text-success{color:#3b6d11}.text-danger{color:#c0392b}
.fw-500{font-weight:500}.fw-600{font-weight:600}
.mt-2{margin-top:var(--sp-2)}.mt-3{margin-top:var(--sp-3)}
.mb-2{margin-bottom:var(--sp-2)}.mb-3{margin-bottom:var(--sp-3)}
.gap-2{gap:var(--sp-2)}.gap-3{gap:var(--sp-3)}

/* --- Custom extensions (same token vocabulary, documented) --- */
/* .cat-row — horizontal category budget-vs-actual row */
.cat-row{margin-bottom:12px}
.cat-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;cursor:pointer;gap:8px}
.cat-row-name{font-size:var(--t-sm);font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-row-nums{display:flex;gap:8px;align-items:center;flex-shrink:0}
.cat-num{font-size:var(--t-sm);font-weight:600;color:var(--text)}
.cat-bgt{font-size:var(--t-sm);color:var(--muted)}

/* .sparkline canvas used inline */
.sparkline-wrap{margin-top:6px}

/* Year selector pills strip */
.year-strip{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.year-btn{font-size:10px;font-weight:600;padding:3px 9px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s;-webkit-tap-highlight-color:transparent}
.year-btn:hover{border-color:#bbb;color:var(--text)}
.year-btn.active{background:var(--navy);border-color:var(--navy);color:var(--on-navy)}

/* Trend chart container */
.chart-wrap{width:100%;overflow:hidden}
canvas{display:block;width:100% !important}

/* Data table */
.data-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.data-table{width:100%;border-collapse:collapse;font-size:var(--t-sm);white-space:nowrap}
.data-table th{background:var(--navy);color:var(--on-navy);padding:6px 10px;text-align:right;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0}
.data-table th:first-child{text-align:left;position:sticky;left:0;z-index:2}
.data-table td{padding:5px 10px;text-align:right;border-bottom:1px solid var(--border2);color:var(--text)}
.data-table td:first-child{text-align:left;font-weight:600;font-size:var(--t-sm);background:var(--white);position:sticky;left:0;border-right:1px solid var(--border)}
.data-table tr:nth-child(even) td{background:var(--surface)}
.data-table tr:nth-child(even) td:first-child{background:var(--surface)}
.data-table tfoot td{font-weight:600;background:var(--navy2);color:var(--on-navy);border-top:2px solid var(--navy3)}
.data-table tfoot td:first-child{background:var(--navy2)}

/* Sub-cat detail drill */
.subcat-btn{font-size:var(--t-xs);padding:2px 7px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;font-family:inherit;margin:2px;transition:all .12s}
.subcat-btn:hover{border-color:var(--blue);color:var(--blue)}
.subcat-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* Notice */
.notice{border-radius:9px;padding:9px 11px;margin-bottom:var(--sp-2)}
.notice-lbl{font-size:var(--t-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.notice-body{font-size:10px;line-height:1.5}
.notice-info{background:#fff8e8;border:1px solid #f0d890}
.notice-info .notice-lbl{color:#8a6000}
.notice-info .notice-body{color:#6a4800}

/* Back button */
.back-btn{font-size:11px;font-weight:600;padding:3px 12px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;font-family:inherit;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px}
.back-btn:hover{border-color:var(--blue);color:var(--blue)}

/* Section separator */
.section-sep{height:1px;background:var(--border);margin:8px 0 16px}

/* Overflow scrollable hscroll */
.hscroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:0 -14px 14px;padding:4px 14px 8px}
.hscroll-wrap::-webkit-scrollbar{display:none}
.hscroll-inner{display:flex;gap:6px;width:max-content}
@media(min-width:600px){.hscroll-wrap{overflow:visible;margin:0 0 14px;padding:3px 0 6px}.hscroll-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));width:auto}}
.item-card{min-width:100px;flex-shrink:0;border:1.5px solid var(--border);border-radius:11px;padding:9px 8px 8px;background:var(--white);cursor:pointer;display:flex;flex-direction:column;min-height:90px;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.item-card:hover{border-color:#bbb}
.item-card.sel{border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,95,165,.15)}
.ic-label{font-size:var(--t-xs);font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.ic-value{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.ic-meta{font-size:9px;color:#999;margin-bottom:4px;flex:1}
</style>
</head>

// ─── PARSE ────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // handle quoted fields
    const parts = [];
    let inQ = false, cur = '';
    for (let c of line) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { parts.push(cur); cur = ''; }
      else cur += c;
    }
    parts.push(cur);
    if (parts.length < 6) continue;
    const val = parseFloat(parts[5]) || 0;
    if (val <= 0) continue; // skip zeros and negatives for actuals spending
    rows.push({
      year: parseInt(parts[0]),
      month: parts[1].trim(),
      source: parts[2].trim(),
      cat: parts[3].trim(),
      sub: parts[4].trim(),
      val
    });
  }
  return rows;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function sum(arr, fn) { return arr.reduce((s,r)=>{const v=fn?fn(r):r; return s+(isFinite(v)?v:0)},0); }
function fmt(n) { return Math.round(n).toLocaleString('de-CH'); }
function fmtK(n) { return n>=1000?`${(n/1000).toFixed(1)}k`:`${Math.round(n)}`; }

function getYearActuals(year) {
  return ACTUALS.filter(r=>r.year===year);
}
function getYearBudgets(year) {
  return BUDGETS.filter(r=>r.year===year);
}
function sumByCat(rows) {
  const m = {};
  rows.forEach(r=>{ if(!m[r.cat])m[r.cat]=0; m[r.cat]+=r.val; });
  return m;
}
function sumBySubCat(rows, cat) {
  const m = {};
  rows.filter(r=>r.cat===cat).forEach(r=>{
    if(!m[r.sub])m[r.sub]=0; m[r.sub]+=r.val;
  });
  return m;
}

// Monthly actuals totals for a year
function getMonthlyTotals(year) {
  const rows = ACTUALS.filter(r=>r.year===year);
  return MONTHS.map(m=>sum(rows.filter(r=>r.month===m), r=>r.val));
}

// Monthly budget totals for a year
function getMonthlyBudgets(year) {
  const rows = BUDGETS.filter(r=>r.year===year);
  return MONTHS.map(m=>sum(rows.filter(r=>r.month===m), r=>r.val));
}

// ─── SPARKLINE DRAWER ─────────────────────────────────────────────────────────
function drawSparkline(canvas, data, color='#185fa5', fill=true) {
  const W=canvas.width, H=canvas.height;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const valid = data.filter(v=>v>0);
  if(!valid.length) return;
  const mn=Math.min(...valid), mx=Math.max(...valid);
  const range=mx-mn||1;
  const pts=data.map((v,i)=>({
    x: i/(data.length-1||1)*(W-4)+2,
    y: H-2-((v-mn)/range)*(H-8)+4
  }));
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) {
    const p=pts[i-1],q=pts[i];
    ctx.bezierCurveTo((p.x+q.x)/2,p.y,(p.x+q.x)/2,q.y,q.x,q.y);
  }
  if(fill){
    ctx.lineTo(pts[pts.length-1].x,H);
    ctx.lineTo(pts[0].x,H);
    ctx.closePath();
    ctx.fillStyle=color+'22';
    ctx.fill();
  }
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) {
    const p=pts[i-1],q=pts[i];
    ctx.bezierCurveTo((p.x+q.x)/2,p.y,(p.x+q.x)/2,q.y,q.x,q.y);
  }
  ctx.strokeStyle=color;
  ctx.lineWidth=1.5;
  ctx.stroke();
  // last dot
  const lp=pts[pts.length-1];
  ctx.beginPath();
  ctx.arc(lp.x,lp.y,2.5,0,Math.PI*2);
  ctx.fillStyle=color;
  ctx.fill();
}

// ─── MULTI-LINE TREND CHART ───────────────────────────────────────────────────
function drawTrendChart(canvas, series, years, colors) {
  const DPR = window.devicePixelRatio||1;
  const W=canvas.clientWidth||canvas.width;
  const H=150;
  canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(DPR,DPR);
  ctx.clearRect(0,0,W,H);
  
  const PAD={t:12,r:10,b:28,l:42};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;
  
  const allVals=series.flatMap(s=>s.data).filter(v=>isFinite(v)&&v>0);
  if(!allVals.length) return;
  const mn=0, mx=Math.max(...allVals)*1.1;
  
  // Grid lines
  ctx.strokeStyle='#e8e6e0'; ctx.lineWidth=0.5;
  const ticks=4;
  for(let i=0;i<=ticks;i++){
    const y=PAD.t+cH-(i/ticks)*cH;
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(PAD.l+cW,y); ctx.stroke();
    ctx.fillStyle='#999'; ctx.font='9px Inter,sans-serif'; ctx.textAlign='right';
    ctx.fillText(fmtK((i/ticks)*(mx-mn)+mn),PAD.l-4,y+3);
  }
  
  // Year labels
  ctx.fillStyle='#999'; ctx.font='8px Inter,sans-serif'; ctx.textAlign='center';
  years.forEach((yr,i)=>{
    const x=PAD.l+(i/(years.length-1||1))*cW;
    ctx.fillText(yr,x,H-6);
  });
  
  // Series lines
  series.forEach((s,si)=>{
    const pts=s.data.map((v,i)=>({
      x:PAD.l+(i/(years.length-1||1))*cW,
      y:PAD.t+cH-((v-mn)/(mx-mn||1))*cH
    }));
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++){
      const p=pts[i-1],q=pts[i];
      ctx.bezierCurveTo((p.x+q.x)/2,p.y,(p.x+q.x)/2,q.y,q.x,q.y);
    }
    ctx.strokeStyle=colors[si]; ctx.lineWidth=1.8; ctx.stroke();
    // dots
    pts.forEach(pt=>{
      ctx.beginPath(); ctx.arc(pt.x,pt.y,2,0,Math.PI*2);
      ctx.fillStyle=colors[si]; ctx.fill();
    });
  });
}

      bpts.forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.stroke();
      ctx.setLineDash([]);
    }
  });

      html+=`<td>${v>0?fmtK(v):'—'}</td>`;
    });
    html+=`</tr>`;
  });
  
  html+=`</tbody><tfoot><tr><td>Total</td>`;
  totals.forEach(t=>html+=`<td>${fmtK(t)}</td>`);
  html+=`</tr></tfoot></table></div></div>`;
  document.getElementById('sec4').innerHTML=html;
}

// ─── DETAIL VIEW ──────────────────────────────────────────────────────────────
function showDetail(cat) {
  document.getElementById('mainView').style.display='none';
  const dv=document.getElementById('detailView');
  dv.style.display='block';
  
  // Sub-cat totals for selected year
  const subcatActuals=sumBySubCat(getYearActuals(selectedYear), cat);
  const subcatBudgets=sumBySubCat(getYearBudgets(selectedYear), cat);
  const allSubs=[...new Set([
    ...Object.keys(subcatActuals),
    ...Object.keys(subcatBudgets)
  ])].filter(s=>s&&s!=='(blank)'&&s!=='0');
  
  // Trend by sub-cat across years
  const subTrend={};
  allSubs.forEach(sub=>{
    subTrend[sub]=YEARS_WITH_DATA.map(yr=>
      sum(ACTUALS.filter(r=>r.year===yr&&r.cat===cat&&r.sub===sub),r=>r.val)
    );
  });
  
  const catColor=CAT_COLORS[cat]||'#185fa5';
  const totalAct=sum(Object.values(subcatActuals));
  const totalBgt=sum(Object.values(subcatBudgets));
  
  // Generate sub-palette
  const subColors=allSubs.map((_,i)=>{
    const hues=[catColor,'#ef9f27','#7f77dd','#20a080','#3b6d11','#c0392b','#888780','#185fa5'];
    return hues[i%hues.length];
  });
  
  let html=`
    <button class="back-btn" onclick="backToMain()">‹ Back to Dashboard</button>
    <div class="sec-lbl">${cat} · Detail View · ${selectedYear}</div>
    <div class="card-hero">
      <div class="hero-strip" style="background:${catColor}">
        <div>
          <div class="hs-title">${cat}</div>
          <div class="hs-sub">Sub-category breakdown · ${selectedYear}</div>
        </div>
        <div class="hs-right">
          <div class="hs-stat">CHF ${fmt(totalAct)}</div>
          <div class="hs-lbl">Budget: CHF ${fmt(totalBgt)}</div>
        </div>
      </div>
      <div class="card-body">`;
  
  allSubs.forEach((sub,si)=>{
    const act=subcatActuals[sub]||0;
    const bgt=subcatBudgets[sub]||0;
    if(act<0.5&&bgt<0.5) return;
    const pct=bgt>0?Math.min(act/bgt*100,120):100;
    const fillCol=pct>100?'fill-danger':pct>85?'fill-warning':'fill-primary';
    html+=`
      <div class="cat-row">
        <div class="cat-row-header" style="cursor:default">
          <div style="display:flex;align-items:center;gap:6px;flex:1">
            <div style="width:6px;height:6px;border-radius:50%;background:${subColors[si]};flex-shrink:0"></div>
            <span class="cat-row-name">${sub}</span>
          </div>
          <div class="cat-row-nums">
            <span class="cat-num">CHF ${fmt(act)}</span>
            ${bgt>0?`<span class="cat-bgt">/ ${fmt(bgt)}</span>`:''}
          </div>
        </div>
        <div class="progress-bg h-md">
          <div class="progress-fill ${fillCol}" style="background:${subColors[si]};width:${Math.min(pct,100)}%"></div>
        </div>
      </div>`;
  });
  html+=`</div></div>`;
  
  // Sub-cat trend chart
  html+=`
    <div class="sec-lbl mt-3">Sub-category Trend by Year</div>
    <div class="legend" id="detailLegend">`;
  allSubs.forEach((sub,si)=>html+=`<div class="legend-item"><div class="legend-dot" style="background:${subColors[si]}"></div>${sub}</div>`);
  html+=`</div>`;
  html+=`<div class="card"><div class="chart-wrap"><canvas id="detailChart"></canvas></div></div>`;
  
  dv.innerHTML=html;
  
  requestAnimationFrame(()=>{
    const canvas=document.getElementById('detailChart');
    if(!canvas) return;
    const series=allSubs.map(sub=>({name:sub,data:subTrend[sub]}));
    drawTrendChart(canvas, series, YEARS_WITH_DATA, subColors);
  });
}

function backToMain() {
  document.getElementById('mainView').style.display='block';
  document.getElementById('detailView').style.display='none';
}

function selectYear(y) {
  selectedYear=y;
  document.getElementById('headerBadge').textContent=y;
  renderYearStrip();
  renderSection1(y);
  renderSection2(y);
  // sections 3 & 4 are year-independent
}

// ─── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  renderYearStrip();
  renderSection1(selectedYear);
  renderSection2(selectedYear);
  renderSection3();
  renderSection4();
}

// Re-draw trend chart on resize
window.addEventListener('resize', ()=>{
  const c=document.getElementById('trendCanvas');
  if(c){
    const series=Object.keys(CAT_COLORS).filter(c=>c!=='Other expenses').map(cat=>({
      name:cat,
      data:YEARS_WITH_DATA.map(yr=>sum(ACTUALS.filter(r=>r.year===yr&&r.cat===cat),r=>r.val))
    }));
    const colors=Object.keys(CAT_COLORS).filter(c=>c!=='Other expenses').map(c=>CAT_COLORS[c]);
    drawTrendChart(c, series, YEARS_WITH_DATA, colors);
  }
});

init();
</script>

</html>
