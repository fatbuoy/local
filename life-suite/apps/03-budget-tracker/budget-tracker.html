<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../../images/icons/wallet.svg" type="image/svg+xml">
<title>Pocket Change</title>
<link rel="stylesheet" href="../../shared/base.css">
<style>
/* ── Budget app theme: dark forest green ── */
:root {
  --app-primary:    #1a3a1a;
  --app-primary2:   #2a5a2a;
  --app-primary3:   #3a8a3a;
  --app-accent:     #2d7a2d;
  --app-on-primary:    #ffffff;
  --app-on-primary2:   #a8d4a8;
  --app-on-primary3:   #7ab87a;
}
</style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-row">
      <div class="header-left">
        <a class="header-home" href="../../index.html" title="Hub">⌂</a>
        <span class="header-title">ⓈⒶⒽⒶⓃⒾ Pocket Change</span>
      </div>
      <div class="header-right">
        <button class="privacy-btn" id="privacyBtn" onclick="togglePrivacy()">👁</button>
        <span class="header-badge" id="yearBadge">—</span>
      </div>
    </div>
  </div>
</header>

<div id="chartTooltip"></div>

<div class="container" id="app">
  <div class="sec-lbl" style="margin-top:8px">Select Year</div>
  <div class="period-strip" id="periodStrip"></div>

  <div id="sec1"></div>
  <div id="sec2"></div>
  <div class="section-sep"></div>
  <div id="sec3"></div>
  <div id="sec4"></div>
  <div id="detailView" style="display:none"></div>
</div>

<script src="../../shared/utils.js"></script>
<script>
/* ─── App config ────────────────────────────────────────────────── */
const CURRENCY = 'CHF';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const CAT_COLORS = {
  'Groceries':        '#2d7a2d',
  'Housing':          '#0c2340',
  'Recreation':       '#ef9f27',
  'Shopping':         '#7f77dd',
  'Transportation':   '#185fa5',
  'Utilities & Bills':'#20a080',
  'Vacation & Travel':'#c0392b',
  'Health':           '#888780',
  'Other expenses':   '#aaa'
};

/* ─── State ─────────────────────────────────────────────────────── */
let ALL_DATA = [];
let ACTUALS = [], BUDGETS = [];
let YEARS = [];
let selectedYear = new Date().getFullYear();

/* ─── Data helpers ──────────────────────────────────────────────── */
function getActuals(year) { return ACTUALS.filter(r => r.year === year) }
function getBudgets(year) { return BUDGETS.filter(r => r.year === year) }
function sumCat(rows)     { const m = {}; rows.forEach(r => { m[r.category] = (m[r.category] || 0) + r.amount }); return m }
function sumSub(rows, cat){ const m = {}; rows.filter(r => r.category === cat).forEach(r => { m[r.subCategory] = (m[r.subCategory] || 0) + r.amount }); return m }
function monthlyTotals(year) {
  return MONTHS.map(m => sumBy(ACTUALS.filter(r => r.year === year && r.month === m), r => r.amount));
}
function monthlyBudgets(year) {
  return MONTHS.map(m => sumBy(BUDGETS.filter(r => r.year === year && r.month === m), r => r.amount));
}

/* ─── Privacy hook ──────────────────────────────────────────────── */
function onPrivacyChange() {
  renderSec1(selectedYear);
  renderSec2(selectedYear);
}

/* ─── Forecast ──────────────────────────────────────────────────── */
function forecast(year) {
  if (year !== new Date().getFullYear()) return null;
  const curr = monthlyTotals(year), bgt = monthlyBudgets(year);
  let actual = 0, projected = 0;
  curr.forEach((v, i) => { if (v > 0) actual += v; else projected += (bgt[i] || 0); });
  return { actual, projected, total: actual + projected };
}

/* ─── SECTION 1: Hero overall ───────────────────────────────────── */
function renderSec1(year) {
  const rows = getActuals(year), brows = getBudgets(year);
  const totalAct = sumBy(rows, r => r.amount);
  const totalBgt = sumBy(brows, r => r.amount);
  const pct = totalBgt > 0 ? Math.round(totalAct / totalBgt * 100) : 0;
  const pillClass = pct > 100 ? 'pill-danger' : pct > 85 ? 'pill-warning' : 'pill-success';
  const fillClass = pct > 100 ? 'fill-danger' : pct > 85 ? 'fill-warning' : 'fill-success';

  const fc = forecast(year);
  const priorTotal = sumBy(ACTUALS.filter(r => r.year === year - 1), r => r.amount);

  let forecastHtml = '';
  if (fc && fc.projected > 0) {
    const fyPct = totalBgt > 0 ? Math.round(fc.total / totalBgt * 100) : 0;
    const fyClass = fyPct > 100 ? 'pill-danger' : fyPct > 90 ? 'pill-warning' : 'pill-info';
    forecastHtml = `<div style="margin-top:6px;font-size:10px;color:var(--app-on-primary3)">
      Forecast EOY: ${pn(fc.total, CURRENCY + ' ' + fmt(fc.total))}
      <span class="pill ${fyClass}">${fyPct}%</span>
    </div>`;
  }

  document.getElementById('sec1').innerHTML = `
    <div class="sec-lbl">${year} · Budget vs Actuals</div>
    <div class="card-hero">
      <div class="hero-strip">
        <div style="flex:1;min-width:0">
          <div class="hs-title">Total Spend ${year}</div>
          <div class="hs-sub">Year to date vs budget</div>
          <div style="margin-top:8px"><span class="pill ${pillClass}">${pct}% of budget</span></div>
          ${forecastHtml}
        </div>
        <div class="hs-right">
          <div class="hs-stat">${pn(totalAct, CURRENCY + ' ' + fmt(totalAct))}</div>
          <div class="hs-lbl">${pn(totalBgt, 'Budget ' + CURRENCY + ' ' + fmt(totalBgt))}</div>
          ${year > YEARS[0] ? `<div class="hs-lbl" style="margin-top:4px;font-size:9px">Prior yr: ${pn(priorTotal, CURRENCY + ' ' + fmt(priorTotal))}</div>` : ''}
        </div>
      </div>
      <div class="card-body">
        <div class="progress-wrap">
          <div class="flex-between mb-2">
            <span style="font-size:10px;color:var(--muted)">Actuals vs Budget</span>
            <span style="font-size:10px;font-weight:600">${pn(totalAct, fmt(totalAct))} / ${pn(totalBgt, fmt(totalBgt))}</span>
          </div>
          <div class="progress-bg h-lg"><div class="progress-fill ${fillClass}" style="width:${Math.min(pct,100)}%"></div></div>
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 4px;font-size:10px;color:var(--muted)">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:18px;height:2px;background:var(--app-accent);display:inline-block"></span>This year</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:18px;height:8px;background:rgba(239,159,39,.3);display:inline-block;border-radius:2px"></span>Prior year</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:18px;height:0;border-top:2px dashed #5a6a7a;display:inline-block"></span>Budget</span>
        </div>
        <canvas id="heroChart" style="width:100%;height:80px;cursor:crosshair"></canvas>
      </div>
    </div>`;

  requestAnimationFrame(() => {
    const c = document.getElementById('heroChart');
    if (c) {
      drawHeroSparkline(c, monthlyTotals(year), monthlyTotals(year - 1), monthlyBudgets(year),
        { currentColor: '#2d7a2d', prefix: CURRENCY + ' ' });
      registerChartRedraw(() => {
        const ch = document.getElementById('heroChart');
        if (ch) drawHeroSparkline(ch, monthlyTotals(year), monthlyTotals(year-1), monthlyBudgets(year), { currentColor: '#2d7a2d', prefix: CURRENCY + ' ' });
      });
    }
  });
}

/* ─── SECTION 2: Category breakdown ─────────────────────────────── */
function renderSec2(year) {
  const catAct = sumCat(getActuals(year));
  const catBgt = sumCat(getBudgets(year));
  const cats = Object.keys(CAT_COLORS);

  let html = `<div class="sec-lbl">By Category · ${year}</div><div class="card">`;
  cats.forEach(cat => {
    const act = catAct[cat] || 0, bgt = catBgt[cat] || 0;
    if (act < 1 && bgt < 1) return;
    const pct = bgt > 0 ? Math.min(act / bgt * 100, 120) : 100;
    const fill = pct > 100 ? 'fill-danger' : pct > 85 ? 'fill-warning' : 'fill-accent';
    const diff = act - bgt;
    const diffStr = diff >= 0 ? `+${fmt(diff)}` : fmt(diff);
    const diffClass = diff > 200 ? 'pill-danger' : diff < -200 ? 'pill-success' : 'pill-neutral';
    html += `
      <div class="row-item">
        <div class="ri-header clickable" onclick="showDetail('${cat}')">
          <div class="ri-left">
            <div class="ri-dot" style="background:${CAT_COLORS[cat]}"></div>
            <span class="ri-name">${cat}</span>
          </div>
          <div class="ri-right">
            <span class="ri-value num-private">${CURRENCY} ${fmtK(act)}</span>
            <span class="ri-meta num-private">/ ${fmtK(bgt)}</span>
            ${bgt > 0 ? `<span class="pill ${diffClass} num-private">${diffStr}</span>` : ''}
            <span class="ri-caret">›</span>
          </div>
        </div>
        <div class="progress-bg h-md"><div class="progress-fill ${fill}" style="background:${CAT_COLORS[cat]};opacity:.8;width:${Math.min(pct,100)}%"></div></div>
      </div>`;
  });
  html += `<div style="font-size:9px;color:var(--faint);margin-top:4px">Tap a category for sub-category detail</div></div>`;
  document.getElementById('sec2').innerHTML = html;
}

/* ─── SECTION 3: Category trend chart ───────────────────────────── */
function renderSec3() {
  const cats = Object.keys(CAT_COLORS).filter(c => c !== 'Other expenses');
  const series = cats.map(cat => ({
    name: cat,
    data: YEARS.map(yr => sumBy(ACTUALS.filter(r => r.year === yr && r.category === cat), r => r.amount))
  }));
  const colors = cats.map(c => CAT_COLORS[c]);

  document.getElementById('sec3').innerHTML = `
    <div class="sec-lbl">Spend Trend by Category</div>
    <div class="legend">${cats.map((c,i) => `<div class="legend-item"><div class="legend-dot" style="background:${colors[i]}"></div>${c}</div>`).join('')}</div>
    <div class="card"><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>`;

  requestAnimationFrame(() => {
    const c = document.getElementById('trendChart');
    if (c) {
      drawTrendChart(c, series, YEARS, colors, { prefix: CURRENCY + ' ' });
      registerChartRedraw(() => { const ch = document.getElementById('trendChart'); if (ch) drawTrendChart(ch, series, YEARS, colors, { prefix: CURRENCY + ' ' }); });
    }
  });
}

/* ─── SECTION 4: Data table ──────────────────────────────────────── */
function renderSec4() {
  const cats = Object.keys(CAT_COLORS).filter(c => c !== 'Other expenses');
  const yrs = [...YEARS].reverse();
  const totals = Array(yrs.length).fill(0);

  let html = `<div class="sec-lbl">Actuals by Category &amp; Year</div>
    <div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table class="data-table">
    <thead><tr><th>Category</th>${yrs.map(y => `<th>${y}</th>`).join('')}</tr></thead><tbody>`;

  cats.forEach(cat => {
    html += `<tr><td style="cursor:pointer;color:var(--app-accent)" onclick="showDetail('${cat}')">● ${cat}</td>`;
    yrs.forEach((yr, i) => {
      const v = sumBy(ACTUALS.filter(r => r.year === yr && r.category === cat), r => r.amount);
      totals[i] += v;
      html += `<td class="num-private">${v > 0 ? fmtK(v) : '—'}</td>`;
    });
    html += '</tr>';
  });
  html += `</tbody><tfoot><tr><td>Total</td>${totals.map(t => `<td class="num-private">${fmtK(t)}</td>`).join('')}</tr></tfoot></table></div></div>`;
  document.getElementById('sec4').innerHTML = html;
}

/* ─── DETAIL VIEW ───────────────────────────────────────────────── */
function showDetail(cat) {
  document.getElementById('sec1').style.display = 'none';
  document.getElementById('sec2').style.display = 'none';
  document.getElementById('sec3').style.display = 'none';
  document.getElementById('sec4').style.display = 'none';
  document.getElementById('periodStrip').style.display = 'none';
  document.querySelector('.sec-lbl').style.display = 'none';

  const subAct = sumSub(getActuals(selectedYear), cat);
  const subBgt = sumSub(getBudgets(selectedYear), cat);
  const subs = [...new Set([...Object.keys(subAct), ...Object.keys(subBgt)])].filter(s => s && s !== '(blank)');
  const totalAct = sumBy(Object.values(subAct));
  const totalBgt = sumBy(Object.values(subBgt));
  const catColor = CAT_COLORS[cat] || '#888';

  const subColors = ['#2d7a2d','#ef9f27','#7f77dd','#20a080','#c0392b','#185fa5','#888780','#0c2340'];
  const series = subs.map((sub, si) => ({
    name: sub,
    data: YEARS.map(yr => sumBy(ACTUALS.filter(r => r.year === yr && r.category === cat && r.subCategory === sub), r => r.amount))
  }));

  let html = `
    <button class="back-btn" onclick="backToMain()">‹ Back</button>
    <div class="sec-lbl">${cat} · ${selectedYear}</div>
    <div class="card-hero">
      <div class="hero-strip" style="background:${catColor}">
        <div>
          <div class="hs-title">${cat}</div>
          <div class="hs-sub" style="color:var(--app-on-primary2)">Sub-category breakdown · ${selectedYear}</div>
        </div>
        <div class="hs-right">
          <div class="hs-stat num-private">${CURRENCY} ${fmt(totalAct)}</div>
          <div class="hs-lbl num-private">Budget ${CURRENCY} ${fmt(totalBgt)}</div>
        </div>
      </div>
      <div class="card-body">`;

  subs.forEach((sub, si) => {
    const act = subAct[sub] || 0, bgt = subBgt[sub] || 0;
    if (act < 0.5 && bgt < 0.5) return;
    const pct = bgt > 0 ? Math.min(act / bgt * 100, 120) : 100;
    html += `
      <div class="row-item">
        <div class="ri-header">
          <div class="ri-left">
            <div class="ri-dot" style="background:${subColors[si % subColors.length]}"></div>
            <span class="ri-name">${sub}</span>
          </div>
          <div class="ri-right">
            <span class="ri-value num-private">${CURRENCY} ${fmt(act)}</span>
            ${bgt > 0 ? `<span class="ri-meta num-private">/ ${fmt(bgt)}</span>` : ''}
          </div>
        </div>
        <div class="progress-bg h-md"><div class="progress-fill" style="background:${subColors[si % subColors.length]};width:${Math.min(pct,100)}%"></div></div>
      </div>`;
  });
  html += `</div></div>
    <div class="sec-lbl mt-3">Sub-category Trend</div>
    <div class="legend">${subs.map((s,i) => `<div class="legend-item"><div class="legend-dot" style="background:${subColors[i%subColors.length]}"></div>${s}</div>`).join('')}</div>
    <div class="card"><div class="chart-wrap"><canvas id="detailChart"></canvas></div></div>`;

  document.getElementById('detailView').style.display = 'block';
  document.getElementById('detailView').innerHTML = html;

  requestAnimationFrame(() => {
    const c = document.getElementById('detailChart');
    if (c) drawTrendChart(c, series, YEARS, subs.map((_,i) => subColors[i % subColors.length]), { prefix: CURRENCY + ' ' });
  });
}

function backToMain() {
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('detailView').innerHTML = '';
  ['sec1','sec2','sec3','sec4','periodStrip'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = '';
  });
  document.querySelector('.sec-lbl').style.display = '';
}

/* ─── YEAR SELECTION ─────────────────────────────────────────────── */
function selectYear(year) {
  selectedYear = year;
  document.getElementById('yearBadge').textContent = year;
  renderSec1(year);
  renderSec2(year);
  renderPeriodStrip('periodStrip', YEARS, selectedYear, selectYear, { reverse: true });
}

/* ─── INIT ───────────────────────────────────────────────────────── */
(async () => {
  setPrivacyPassword('SundayRunday');

  const raw = await fetchData('../../data/budget.json');
  if (!raw) return;

  ALL_DATA = raw.data || [];
  ACTUALS  = ALL_DATA.filter(r => r.source === 'Actuals');
  BUDGETS  = ALL_DATA.filter(r => r.source === 'Budget');
  YEARS    = [...new Set(ACTUALS.map(r => r.year))].sort();

  if (!YEARS.length) {
    document.getElementById('app').innerHTML = '<div class="card"><div style="color:var(--muted);font-size:13px">No actuals data found in data.json</div></div>';
    return;
  }

  selectedYear = YEARS.includes(new Date().getFullYear()) ? new Date().getFullYear() : YEARS[YEARS.length - 1];
  document.getElementById('yearBadge').textContent = selectedYear;

  renderPeriodStrip('periodStrip', YEARS, selectedYear, selectYear, { reverse: true });
  renderSec1(selectedYear);
  renderSec2(selectedYear);
  renderSec3();
  renderSec4();
})();
</script>
</body>
</html>
